generation:
  backend: openai_api

backends:
  openai_api:
    enabled: true
    max_output_tokens: 4000

  manual_chatgpt:
    enabled: true
    prompt_export_dir: 99-meta/pending-prompts
    response_import_dir: 99-meta/manual-responses

  codex:
    enabled: true
    task_export_dir: 99-meta/codex-tasks
    mode: export_only

  mock:
    enabled: true

llm:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0.2
  max_retries: 2
  retry_delay_seconds: 0
  timeout_seconds: 60

workflow:
  default_review: false
  resume_enabled: true
  stop_on_failure: true
  fail_on_warnings: false
  steps:
    - discover
    - plan
    - write

output:
  format: markdown
  create_run_directory: true
  overwrite: false

prompts:
  directory: prompts
  extension: .md
